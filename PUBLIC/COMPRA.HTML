<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de la Compra</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6">

    <h1 class="text-2xl font-bold text-center text-gray-800 mb-4">
      🛒 Lista de la Compra
    </h1>

    <!-- Input -->
    <div class="flex gap-2 mb-4">
      <input id="itemInput"
             type="text"
             placeholder="Añade un artículo..."
             class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      <button onclick="addItem()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded-xl transition">
        Añadir
      </button>
    </div>

    <!-- Botón limpiar marcados -->
    <div class="flex justify-between items-center mb-3">
      <button onclick="clearChecked()"
              class="text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg transition">
        Vaciar comprados
      </button>

      <span id="counter" class="text-sm text-gray-500"></span>
    </div>

    <!-- Lista -->
    <ul id="list" class="space-y-2"></ul>

  </div>

  <script>
    const listEl = document.getElementById("list");
    const input = document.getElementById("itemInput");
    const counter = document.getElementById("counter");

    async function api(path, options) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!res.ok) throw new Error("Error de red");
      return res.json();
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadItems() {
      const items = await api("/api/items");
      renderList(items);
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      await api("/api/items", { method: "POST", body: JSON.stringify({ text }) });
      loadItems();
    }

    async function toggleItem(id, currentlyChecked) {
      await api(`/api/items/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ checked: !currentlyChecked })
      });
      loadItems();
    }

    async function deleteItem(id) {
      await api(`/api/items/${id}`, { method: "DELETE" });
      loadItems();
    }

    async function clearChecked() {
      await api("/api/items/clear-checked", { method: "POST" });
      loadItems();
    }

    function renderList(items) {
      listEl.innerHTML = "";

      items.forEach(item => {
        const li = document.createElement("li");
        li.className = "flex items-center justify-between bg-gray-50 p-3 rounded-xl shadow-sm";

        li.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="checkbox" class="item-check w-5 h-5 accent-green-500" ${item.checked ? "checked" : ""}>
            <span class="item-text text-gray-700 ${item.checked ? "line-through text-gray-400" : ""}">${escapeHtml(item.text)}</span>
          </div>
          <button class="text-red-500 hover:text-red-700 font-semibold">
            Eliminar
          </button>
        `;

        li.querySelector(".item-check").addEventListener("change", () => {
          toggleItem(item.id, !!item.checked);
        });

        li.querySelector("button").addEventListener("click", () => {
          deleteItem(item.id);
        });

        listEl.appendChild(li);
      });

      const total = items.length;
      const checked = items.filter(i => i.checked).length;
      counter.textContent = `${checked} / ${total} comprados`;
    }

    // Enter para añadir
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") addItem();
    });

    // Refresco periódico para ver cambios hechos por la otra persona
    setInterval(loadItems, 4000);

    loadItems();
  </script>

</body>
</html>
