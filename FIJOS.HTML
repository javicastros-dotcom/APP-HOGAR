<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Fijos</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-100 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-3xl">

        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8">

            <h1 class="text-4xl font-bold text-center text-amber-700 mb-2">
                📌 Gastos Fijos
            </h1>

            <p class="text-center text-gray-500 mb-8">
                Guarda tus gastos habituales y regístralos con un click el día que toque pagarlos
            </p>

            <!-- Formulario -->
            <div class="grid md:grid-cols-4 gap-4 mb-8">

                <input
                    type="text"
                    id="descripcionInput"
                    placeholder="Descripción..."
                    class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >

                <select
                    id="categoriaInput"
                    class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
                    <option value="Colegios">Colegios</option>
                    <option value="Telefono">Teléfono</option>
                    <option value="Coches">Coches</option>
                    <option value="Supermercados">Supermercados</option>
                    <option value="Luz">Luz</option>
                    <option value="Agua">Agua</option>
                    <option value="Ocio">Ocio</option>
                    <option value="Salud">Salud</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Nominas">Nóminas</option>
                    <option value="Otros">Otros</option>
                </select>

                <input
                    type="number"
                    id="importeInput"
                    placeholder="Importe (€)"
                    step="0.01"
                    min="0"
                    class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >

                <button
                    onclick="addFijo()"
                    class="bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-lg"
                >
                    ➕ Guardar
                </button>

            </div>

            <!-- Lista de gastos fijos -->
            <div id="fijosList" class="space-y-3"></div>

        </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getFirestore, collection, addDoc, deleteDoc, doc,
        onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDT8Zmbv2WNiAem_WpGbQTIFd9skWCkf2Q",
        authDomain: "javilyn-f9d54.firebaseapp.com",
        projectId: "javilyn-f9d54",
        storageBucket: "javilyn-f9d54.firebasestorage.app",
        messagingSenderId: "961900478002",
        appId: "1:961900478002:web:652e75b65010a46f4f462b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const fijosCol = collection(db, "gastosFijos");
    const gastosCol = collection(db, "gastos");

    let fijos = [];

    const CATEGORIA_LABEL = { Telefono: "Teléfono", Nominas: "Nóminas" };

    function getCategoriaColor(categoria) {
        switch (categoria) {
            case "Colegios": return "bg-blue-100 text-blue-800";
            case "Telefono": return "bg-purple-100 text-purple-800";
            case "Coches": return "bg-slate-200 text-slate-800";
            case "Supermercados": return "bg-orange-100 text-orange-800";
            case "Luz": return "bg-yellow-100 text-yellow-800";
            case "Agua": return "bg-cyan-100 text-cyan-800";
            case "Ocio": return "bg-pink-100 text-pink-800";
            case "Salud": return "bg-red-100 text-red-800";
            case "Ropa": return "bg-indigo-100 text-indigo-800";
            case "Hogar": return "bg-teal-100 text-teal-800";
            case "Nominas": return "bg-lime-100 text-lime-800";
            case "Otros": return "bg-gray-200 text-gray-800";
            default: return "bg-gray-100 text-gray-700";
        }
    }

    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function toLocalDateString(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
    }

    function formatMoney(n) {
        return n.toLocaleString("es-ES", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
    }

    // ---------- Crear gasto fijo ----------
    window.addFijo = async function () {
        const descripcion = document.getElementById("descripcionInput").value.trim();
        const categoria = document.getElementById("categoriaInput").value;
        const importe = parseFloat(document.getElementById("importeInput").value);

        if (!descripcion) {
            alert("Introduce una descripción");
            return;
        }
        if (isNaN(importe) || importe <= 0) {
            alert("Introduce un importe válido");
            return;
        }

        await addDoc(fijosCol, { descripcion, categoria, importe, createdAt: Date.now() });

        document.getElementById("descripcionInput").value = "";
        document.getElementById("importeInput").value = "";
    };

    // ---------- Eliminar gasto fijo ----------
    window.deleteFijo = async function (id) {
        await deleteDoc(doc(db, "gastosFijos", id));
    };

    // ---------- Registrar el gasto a fecha de hoy ----------
    window.registrarHoy = async function (id) {
        const fijo = fijos.find(f => f.id === id);
        if (!fijo) return;

        await addDoc(gastosCol, {
            tipo: "gasto",
            fecha: toLocalDateString(new Date()),
            categoria: fijo.categoria,
            descripcion: fijo.descripcion,
            importe: fijo.importe,
            createdAt: Date.now()
        });

        alert(`"${fijo.descripcion}" registrado hoy en Gastos e Ingresos ✅`);
    };

    // ---------- Render ----------
    function renderFijos() {
        const list = document.getElementById("fijosList");

        if (fijos.length === 0) {
            list.innerHTML = `
                <div class="bg-gray-50 rounded-2xl p-8 text-center text-gray-500">
                    Todavía no has guardado ningún gasto fijo.
                </div>
            `;
            return;
        }

        list.innerHTML = fijos.map(f => `
            <div class="bg-gray-50 rounded-2xl p-4 shadow-md hover:shadow-lg transition">
                <div class="flex flex-col md:flex-row md:items-center gap-3">

                    <span class="px-3 py-1 rounded-full text-sm font-semibold ${getCategoriaColor(f.categoria)}">
                        ${CATEGORIA_LABEL[f.categoria] || f.categoria}
                    </span>

                    <span class="flex-1 font-medium text-gray-700">
                        ${escapeHtml(f.descripcion)}
                    </span>

                    <span class="font-bold text-lg text-amber-700">
                        ${formatMoney(f.importe)}
                    </span>

                    <div class="flex gap-2">
                        <button
                            onclick="registrarHoy('${f.id}')"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition font-semibold"
                        >
                            ➕ Registrar hoy
                        </button>
                        <button
                            onclick="deleteFijo('${f.id}')"
                            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition"
                        >
                            🗑️
                        </button>
                    </div>

                </div>
            </div>
        `).join("");
    }

    // Escucha en tiempo real
    const q = query(fijosCol, orderBy("createdAt", "asc"));
    onSnapshot(q, snapshot => {
        fijos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderFijos();
    });
</script>

</body>
</html>
