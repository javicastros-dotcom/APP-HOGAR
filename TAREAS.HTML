<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-blue-50 to-cyan-100 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-5xl">

        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8">

            <h1 class="text-4xl font-bold text-center text-indigo-700 mb-2">
                📋 Lista de Tareas
            </h1>

            <p class="text-center text-gray-500 mb-8">
                Organiza tus tareas por responsable y prioridad
            </p>

            <!-- Formulario -->
            <div class="grid md:grid-cols-4 gap-4 mb-6">

                <input
                    type="text"
                    id="taskInput"
                    placeholder="Nueva tarea..."
                    class="md:col-span-2 border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >

                <select
                    id="assignee"
                    class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
                    <option value="Javi">Javi</option>
                    <option value="Miri">Miri</option>
                    <option value="General">General</option>
                </select>

                <select
                    id="priority"
                    class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
                    <option value="1">Prioridad 1</option>
                    <option value="2">Prioridad 2</option>
                    <option value="3">Prioridad 3</option>
                </select>

            </div>

            <button
                onclick="addTask()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-lg"
            >
                ➕ Añadir tarea
            </button>

            <!-- Estadísticas -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8 mb-6">

                <div class="bg-blue-100 p-4 rounded-xl text-center">
                    <div class="text-2xl font-bold" id="totalTasks">0</div>
                    <div class="text-sm text-gray-600">Total</div>
                </div>

                <div class="bg-green-100 p-4 rounded-xl text-center">
                    <div class="text-2xl font-bold" id="completedTasks">0</div>
                    <div class="text-sm text-gray-600">Completadas</div>
                </div>

                <div class="bg-yellow-100 p-4 rounded-xl text-center">
                    <div class="text-2xl font-bold" id="pendingTasks">0</div>
                    <div class="text-sm text-gray-600">Pendientes</div>
                </div>

                <div class="bg-purple-100 p-4 rounded-xl text-center">
                    <div class="text-2xl font-bold" id="completionRate">0%</div>
                    <div class="text-sm text-gray-600">Progreso</div>
                </div>

            </div>

            <!-- Filtros -->
            <div class="grid md:grid-cols-3 gap-4 mb-6">

                <select
                    id="filterStatus"
                    onchange="renderTasks()"
                    class="border rounded-xl px-4 py-3"
                >
                    <option value="all">Todas</option>
                    <option value="pending">Pendientes</option>
                    <option value="completed">Completadas</option>
                </select>

                <select
                    id="filterPriority"
                    onchange="renderTasks()"
                    class="border rounded-xl px-4 py-3"
                >
                    <option value="all">Todas las prioridades</option>
                    <option value="1">Prioridad 1</option>
                    <option value="2">Prioridad 2</option>
                    <option value="3">Prioridad 3</option>
                </select>

                <select
                    id="filterAssignee"
                    onchange="renderTasks()"
                    class="border rounded-xl px-4 py-3"
                >
                    <option value="all">Todos</option>
                    <option value="Javi">Javi</option>
                    <option value="Miri">Miri</option>
                    <option value="General">General</option>
                </select>

            </div>

            <!-- Lista -->
            <div id="taskList" class="space-y-4"></div>

        </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
        onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ============================================================
    // PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE (la misma que en COMPRA.HTML)
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDT8Zmbv2WNiAem_WpGbQTIFd9skWCkf2Q",
        authDomain: "javilyn-f9d54.firebaseapp.com",
        projectId: "javilyn-f9d54",
        storageBucket: "javilyn-f9d54.firebasestorage.app",
        messagingSenderId: "961900478002",
        appId: "1:961900478002:web:652e75b65010a46f4f462b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tasksCol = collection(db, "tasks");

    let tasks = [];

    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function getAssigneeColor(assignee) {
        switch (assignee) {
            case "Javi":
                return "bg-blue-100 text-blue-800";
            case "Miri":
                return "bg-pink-100 text-pink-800";
            default:
                return "bg-green-100 text-green-800";
        }
    }

    function getPriorityColor(priority) {
        switch (priority) {
            case 1:
                return "bg-red-100 text-red-700";
            case 2:
                return "bg-yellow-100 text-yellow-700";
            default:
                return "bg-gray-100 text-gray-700";
        }
    }

    window.addTask = async function () {

        const taskInput = document.getElementById("taskInput");
        const assignee = document.getElementById("assignee").value;
        const priority = parseInt(document.getElementById("priority").value);

        const text = taskInput.value.trim();

        if (!text) {
            alert("Introduce una tarea");
            return;
        }

        taskInput.value = "";

        await addDoc(tasksCol, {
            text, assignee, priority, completed: false, createdAt: Date.now()
        });
    };

    window.deleteTask = async function (id) {
        await deleteDoc(doc(db, "tasks", id));
    };

    window.toggleTask = async function (id, currentlyCompleted) {
        await updateDoc(doc(db, "tasks", id), { completed: !currentlyCompleted });
    };

    function updateStats() {

        const total = tasks.length;
        const completed = tasks.filter(task => task.completed).length;
        const pending = total - completed;

        const percentage =
            total === 0
                ? 0
                : Math.round((completed / total) * 100);

        document.getElementById("totalTasks").textContent = total;
        document.getElementById("completedTasks").textContent = completed;
        document.getElementById("pendingTasks").textContent = pending;
        document.getElementById("completionRate").textContent = percentage + "%";
    }

    window.renderTasks = function () {

        const list = document.getElementById("taskList");

        const statusFilter = document.getElementById("filterStatus").value;
        const priorityFilter = document.getElementById("filterPriority").value;
        const assigneeFilter = document.getElementById("filterAssignee").value;

        let filteredTasks = [...tasks];

        if (statusFilter === "completed") {
            filteredTasks = filteredTasks.filter(task => task.completed);
        }

        if (statusFilter === "pending") {
            filteredTasks = filteredTasks.filter(task => !task.completed);
        }

        if (priorityFilter !== "all") {
            filteredTasks = filteredTasks.filter(
                task => task.priority === Number(priorityFilter)
            );
        }

        if (assigneeFilter !== "all") {
            filteredTasks = filteredTasks.filter(
                task => task.assignee === assigneeFilter
            );
        }

        if (filteredTasks.length === 0) {

            list.innerHTML = `
                <div class="bg-gray-50 rounded-2xl p-8 text-center text-gray-500">
                    No hay tareas que coincidan con los filtros.
                </div>
            `;

            updateStats();
            return;
        }

        list.innerHTML = filteredTasks.map(task => `

            <div class="bg-gray-50 rounded-2xl p-4 shadow-md hover:shadow-lg transition">

                <div class="flex flex-col md:flex-row md:items-center gap-4">

                    <input
                        type="checkbox"
                        ${task.completed ? "checked" : ""}
                        onchange="toggleTask('${task.id}', ${!!task.completed})"
                        class="w-5 h-5"
                    >

                    <div class="flex-1">
                        <p class="font-medium text-lg ${task.completed ? 'completed' : ''}">
                            ${escapeHtml(task.text)}
                        </p>
                    </div>

                    <span class="px-3 py-1 rounded-full text-sm font-semibold ${getAssigneeColor(task.assignee)}">
                        ${task.assignee}
                    </span>

                    <span class="px-3 py-1 rounded-full text-sm font-semibold ${getPriorityColor(task.priority)}">
                        Prioridad ${task.priority}
                    </span>

                    <button
                        onclick="deleteTask('${task.id}')"
                        class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition"
                    >
                        🗑️ Eliminar
                    </button>

                </div>

            </div>

        `).join("");

        updateStats();
    };

    document
        .getElementById("taskInput")
        .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTask();
            }
        });

    // Escucha en tiempo real: cualquier cambio (tuyo o de la otra persona)
    // actualiza la lista al instante, sin recargar la página.
    const q = query(tasksCol, orderBy("createdAt", "desc"));
    onSnapshot(q, snapshot => {
        tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTasks();
    });
</script>

</body>
</html>
