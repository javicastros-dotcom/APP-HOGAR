<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de la Compra</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6">

    <h1 class="text-2xl font-bold text-center text-gray-800 mb-4">
      🛒 Lista de la Compra
    </h1>

    <!-- Input -->
    <div class="flex gap-2 mb-4">
      <input id="itemInput"
             type="text"
             placeholder="Añade un artículo..."
             class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      <button onclick="addItem()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded-xl transition">
        Añadir
      </button>
    </div>

    <!-- Botones de acción -->
    <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
      <div class="flex gap-2">
        <button onclick="clearChecked()"
                class="text-sm bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg transition">
          Vaciar comprados
        </button>
        <button onclick="finalizarCompra()"
                class="text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded-lg transition">
          ✅ Finalizar compra
        </button>
      </div>

      <span id="counter" class="text-sm text-gray-500"></span>
    </div>

    <!-- Lista -->
    <ul id="list" class="space-y-2"></ul>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
      onSnapshot, query, orderBy, getDocs, where
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ============================================================
    // PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE (la que copias del
    // panel de Firebase al registrar tu app web)
    // ============================================================
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const itemsCol = collection(db, "items");
    const gastosCol = collection(db, "gastos");

    const listEl = document.getElementById("list");
    const input = document.getElementById("itemInput");
    const counter = document.getElementById("counter");

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    window.addItem = async function () {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      await addDoc(itemsCol, { text, checked: false, createdAt: Date.now() });
    };

    window.toggleItem = async function (id, currentlyChecked) {
      await updateDoc(doc(db, "items", id), { checked: !currentlyChecked });
    };

    window.deleteItem = async function (id) {
      await deleteDoc(doc(db, "items", id));
    };

    window.clearChecked = async function () {
      const q = query(itemsCol, where("checked", "==", true));
      const snap = await getDocs(q);
      await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    };

    function toLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    window.finalizarCompra = async function () {
      const descripcion = prompt("Descripción del gasto:", "Compra semanal");
      if (descripcion === null) return; // cancelado

      const precioStr = prompt("Precio total (€):");
      if (precioStr === null) return; // cancelado

      const importe = parseFloat(precioStr.replace(",", "."));
      if (isNaN(importe) || importe <= 0) {
        alert("Precio no válido, no se ha añadido el gasto.");
        return;
      }

      await addDoc(gastosCol, {
        tipo: "gasto",
        fecha: toLocalDateString(new Date()),
        categoria: "Supermercados",
        descripcion: descripcion.trim(),
        importe,
        createdAt: Date.now()
      });

      alert("Gasto añadido a Gastos e Ingresos ✅");
    };

    function renderList(items) {
      listEl.innerHTML = "";

      items.forEach(item => {
        const li = document.createElement("li");
        li.className = "flex items-center justify-between bg-gray-50 p-3 rounded-xl shadow-sm";

        li.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="checkbox" class="item-check w-5 h-5 accent-green-500" ${item.checked ? "checked" : ""}>
            <span class="item-text text-gray-700 ${item.checked ? "line-through text-gray-400" : ""}">${escapeHtml(item.text)}</span>
          </div>
          <button class="text-red-500 hover:text-red-700 font-semibold">
            Eliminar
          </button>
        `;

        li.querySelector(".item-check").addEventListener("change", () => {
          toggleItem(item.id, !!item.checked);
        });

        li.querySelector("button").addEventListener("click", () => {
          deleteItem(item.id);
        });

        listEl.appendChild(li);
      });

      const total = items.length;
      const checked = items.filter(i => i.checked).length;
      counter.textContent = `${checked} / ${total} comprados`;
    }

    // Escucha en tiempo real: cualquier cambio (tuyo o de la otra persona)
    // actualiza la lista al instante, sin recargar la página.
    // Se ordena alfabéticamente (localeCompare respeta acentos/mayúsculas en español).
    onSnapshot(itemsCol, snapshot => {
      const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort((a, b) => a.text.localeCompare(b.text, "es", { sensitivity: "base" }));
      renderList(items);
    });

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") addItem();
    });
  </script>

</body>
</html>
